object_id: OBJ-003
name: 费用异动收敛
kind: objective       # 寻优目标（SPEC v0.4 §8：第五型）
version: 1

definition: |
  诊断报告存在的意义：被正文点名的费用异动，在后续统计周期回落、
  或被核实为合理支出。这是本包的寻优目标——报告写得漂亮不算数，
  现实收敛才算数（公理 A2：现实是第二位专家）。

optimize: minimize    # 方向：点名科目的后续异动幅度越小越好

constraints:          # 约束声明，自由文本——留档给人审，机器不解析
  - 不以漏报换收敛：正文报警须覆盖专家终稿的既有口径
  - 附录存疑项不计入收敛口径（未点名即无整改预期）

settle:               # 对账受限形式（SPEC v0.4 §6）：剧集完成后取费用明细对账
  uses: CON-001.拉取费用明细
  when: 次月财务关账后   # 自由文本注释，机器不读；参考实现在剧集完成后立即对账并留痕
