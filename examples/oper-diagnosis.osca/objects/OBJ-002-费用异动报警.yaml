object_id: OBJ-002
name: 费用异动报警
kind: artifact        # 中间产物：medium=payload，仅供流程内部流转（kind 归属见 SPEC v0.3 待定项）
medium: payload
delivery: 流程内部（STR-001 步骤间流转，不对外交付）
version: 3            # 第3版：J-0417 生效后增加了「检修期上下文」字段

# ── 自然语言定义（给模型和人读，比 schema 更重要）──
definition: |
  某下属单位的某类费用科目在一个统计周期内的变动，超出了
  「值得管理层花 30 秒看一眼」的阈值。注意：报警是候选，不是结论——
  一条报警最终出现在报告里，还是被判定为正常波动，由判断层裁决。

# ── 字段与类型（机器可校验的部分）──
schema:
  单位名称:   {type: string, ref: 集团单位主数据}
  费用科目:   {type: enum, values: [差旅费, 会议费, 办公费, 修理费, 咨询费]}
  统计周期:   {type: string, format: "YYYY-Qn 或 YYYY-MM"}
  环比涨幅:   {type: number, unit: "%"}
  绝对金额:   {type: number, unit: 万元}
  检修期上下文: {type: object, nullable: true,
               desc: 该单位当期是否处于检修计划期，及近三年检修期同科目峰值}

# ── 正反样例（LLM 靠这个对齐，比 schema 管用）──
examples:
  positive:   # 「这确实是一条合格的报警」
    - 单位名称: XX热电
      费用科目: 差旅费
      统计周期: 2026-Q3
      环比涨幅: 85
      绝对金额: 42.3
      检修期上下文: {处于检修期: true, 近三年检修期峰值涨幅: 60}
      why: 虽在检修期内，但涨幅超近三年检修期峰值，属于「超常态」，值得报。
  negative:   # 「长得像报警但不是」
    - 单位名称: XX热电
      费用科目: 差旅费
      统计周期: 2026-Q3
      环比涨幅: 45
      检修期上下文: {处于检修期: true, 近三年检修期峰值涨幅: 60}
      why: 见 J-0417——检修期内且未超历史峰值，正常波动，不进报告。
    - 单位名称: XX新能源
      费用科目: 办公费
      环比涨幅: 200
      绝对金额: 0.8
      why: 涨幅惊人但绝对金额不足1万，不满足「值得管理层看30秒」。

# ── 好坏标准（这个 Object 被产出时，什么算产得好）──
quality_bar: |
  一条好的报警：涨幅、金额、上下文三要素齐全；一句话初步归因；
  标注了「已被哪条判断裁决过 / 无既有判断可依」。
