object_id: OBJ-001
name: 月度诊断报告
kind: artifact        # 产出物（SPEC §3）
medium: document
delivery: 飞书文档
version: 2

definition: |
  agent 的最终产出物：给集团经营管理部的月度异动诊断草稿。
  它不是数据汇总（那是财务系统报表的事），是「哪些异动值得看、
  为什么值得看」的裁决结果。篇幅纪律：宁可漏报存疑项到附录，
  不可让正文超过一页——管理层的注意力是这份报告唯一的预算。

schema:
  报告周期:   {type: string, format: "YYYY-MM"}
  正文异动清单: {type: list, items: {ref: OBJ-002}, max_items: 8}
  附录存疑项: {type: list, items: {ref: OBJ-002}}
  数据口径说明: {type: string}

quality_bar: |
  - 正文每条异动 ≤ 3 行：现象一句、归因一句、建议动作一句
  - 归因只允许两种措辞：「已核实：…」（有 Connector 取数支撑）
    或「待核实：…」（推断，需人工确认）——禁止把推断写成事实
  - 被判断层裁决为「正常波动」的项，正文不出现，落附录并注明依据的判断 ID

examples:
  positive:
    - 摘录: "XX热电差旅费 Q3 环比 +85%（42.3万），超近三年检修期峰值（+60%），
             待核实：是否存在检修外包改自营导致的差旅激增。建议经营部电话核实。"
  negative:
    - 摘录: "XX热电差旅费大幅增长，可能存在费用管控问题，建议关注。"
      why: 无数据、无口径、归因含糊、「建议关注」是废话——三行纪律全violated。
