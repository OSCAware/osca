object_id: OBJ-201
name: 待下发处置清单
kind: artifact        # 中间产物：流程内部流转，也是「下发」步的被写内容
version: 1

# ── 自然语言定义（给模型和人读，比 schema 更重要）──
definition: |
  本期需要建处置工单的清单：每条一项处置动作（对谁、做什么、何时完成、谁经办）。
  由 CON-201 的固化查询确定性算出——不是模型自由发挥，也不是判断层裁决，
  是「诊断结论落定后按固化规则汇总」的确定产物。整份清单经审批后下发到工单下发系统。

# ── 字段与类型（机器可校验的部分；也是审批卡呈现的被写内容）──
schema:
  工单标题:   {type: string}
  目标单位:   {type: string, ref: 集团单位主数据}
  处置动作:   {type: string}
  建议完成日: {type: string, format: "YYYY-MM-DD"}
  经办人手机: {type: string, desc: 经办人联系方式；审批卡显示前经 policy.redact 脱敏（手机号），digest 仍绑原文}

quality_bar: |
  一条好的处置项：动作明确、目标单位可核、完成日合理；
  经办人可联系。整份清单可回溯到取数结果，无凭空条目。
